databaseChangeLog:
  - changeSet:
      id: create-news-table
      author: hamza
      changes:
        - createTable:
            tableName: news
            remarks: News table
            columns:
              - column:
                  name: news_id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: title
                  type: VARCHAR(255)
                  constraints:
                    nullable: false

              - column:
                  name: details
                  type: VARCHAR(1000)

              - column:
                  name: reported_by
                  type: VARCHAR(255)

              - column:
                  name: reported_at
                  type: TIMESTAMP