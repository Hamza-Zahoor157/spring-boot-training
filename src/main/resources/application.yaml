spring:
  application:
    name: Lecture02

  security:
    oauth2:
      client:
#        provider:
#          github:
#            user-name-attribute:login
        registration:
          github:
            client-id: ${GITHUB_CLIENT_ID}
            client-secret: ${GITHUB_CLIENT_SECRET}
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - openid
              - profile
              - email
            redirect-uri: ${GOOGLE_REDIRECT_URI:http://localhost:8080/login/oauth2/code/google}

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none

logging:
  level:
    sql: debug
    web: debug
    liquibase: debug

management:
  endpoints:
    web:
      exposure:
        include: "*"

  tracing:
    sampling:
      probability: 1.0

  opentelemetry:
    tracing:
      export:
        otlp:
          endpoint: http://localhost:4318/v1/traces

  # The local receiver accepts traces, but not OTLP metrics at /v1/metrics.
  # Metrics remain available through the configured Prometheus registry.
  otlp:
    metrics:
      export:
        enabled: false

app:
  message:
    welcome: Welcome to RedMath
